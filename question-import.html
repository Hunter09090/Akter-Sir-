<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Question Import</title>

    <!-- CSS -->

    <link rel="stylesheet"
          href="style.css">

    <!-- Firebase -->

    
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>

    <script src="firebase-config.js"></script>

</head>

<body>

    <div class="import-box">

        <h1>

            📥 Question Import Panel

        </h1>

        <p>

            Admin Only

        </p>

        <hr>

        <!-- Category -->

        <label>

            Select Category

        </label>

        <br>

        <select id="category">
                        <option value="সাধারণ জ্ঞান">সাধারণ জ্ঞান</option>

            <option value="বাংলাদেশ">বাংলাদেশ</option>

            <option value="আন্তর্জাতিক">আন্তর্জাতিক</option>

            <option value="ইসলাম">ইসলাম</option>

            <option value="বাংলা">বাংলা</option>

            <option value="ইংরেজি">ইংরেজি</option>

            <option value="গণিত">গণিত</option>

            <option value="বিজ্ঞান">বিজ্ঞান</option>

            <option value="আইসিটি">আইসিটি</option>

            <option value="ধাঁধা">ধাঁধা</option>

            <option value="ইতিহাস">ইতিহাস</option>

            <option value="ভূগোল">ভূগোল</option>

            <option value="খেলাধুলা">খেলাধুলা</option>

            <option value="বিনোদন">বিনোদন</option>

        </select>

        <br><br>

        <label>

            Paste Questions

        </label>

        <br>

        <textarea
            id="questions"
            rows="22"
            placeholder="Paste Questions Here..."></textarea>

        <br><br>

        <button
            id="importBtn">

            📥 Import Questions

        </button>

        <button
            id="clearBtn">

            🗑 Clear

        </button>

        <br><br>

        <div id="status">

            Ready...

        </div>

        <br>

        <div id="result">

            Waiting For Import...

        </div>

    </div>
    <script>



const category =
    document.getElementById("category");

const questions =
    document.getElementById("questions");

const importBtn =
    document.getElementById("importBtn");

const clearBtn =
    document.getElementById("clearBtn");

const status =
    document.getElementById("status");

const result =
    document.getElementById("result");

/* =========================
   Clear
========================= */

clearBtn.onclick = () => {

    questions.value = "";

    status.innerHTML =
        "Ready...";

    result.innerHTML =
        "Waiting For Import...";

};

/* =========================
   Import
========================= */

importBtn.onclick = async () => {

    alert("Button Clicked");
    
    if (!questions.value.trim()) {

        alert("প্রশ্ন Paste করুন");

        return;

    }

    status.innerHTML =
        "Reading Questions...";

    const blocks =
        questions.value
        .trim()
        .split("===");

    let success = 0;

    let duplicate = 0;

    let failed = 0;

    for (const block of blocks) {

        const lines =
            block
            .split("\n")
            .map(item => item.trim())
            .filter(item => item);

        if (lines.length < 6) {

            failed++;

            continue;

        }

        const question =
            lines[0].replace("Q:", "").trim();

        const options = [

            lines[1].replace("A:", "").trim(),

            lines[2].replace("B:", "").trim(),

            lines[3].replace("C:", "").trim(),

            lines[4].replace("D:", "").trim()

        ];

        const answerLetter =
            lines[5]
            .replace("Answer:", "")
            .trim()
            .toUpperCase();

        const answerMap = {

            A: options[0],

            B: options[1],

            C: options[2],

            D: options[3]

        };

        const answer =
            answerMap[answerLetter];

        if (!answer) {

            failed++;

            continue;

        }
                /* =========================
           Duplicate Check
        ========================= */

        const duplicateDoc =
            await db
                .collection("questions")
                .where("category", "==", category.value)
                .where("question", "==", question)
                .limit(1)
                .get();

        if (!duplicateDoc.empty) {

            duplicate++;

            continue;

        }

        /* =========================
           Save Question
        ========================= */

        try {

            await db
                .collection("questions")
                .add({

                    category:
                        category.value,

                    question,

                    options,

                    answer,

                    difficulty: "Easy",

                    createdAt:
                        firebase.firestore.FieldValue.serverTimestamp()

                });

            success++;

            status.innerHTML =
                `Imported : ${success}`;

        }

        catch (error) {

            console.error(error);

            failed++;

        }

    }

    result.innerHTML = `

        <h3>Import Completed</h3>

        <p>✅ Imported : ${success}</p>

        <p>⚠ Duplicate : ${duplicate}</p>

        <p>❌ Failed : ${failed}</p>

    `;

    status.innerHTML =
        "Finished";

};

</script>
<script>
alert("HTML Script Working");
</script>
</body>

</html>
