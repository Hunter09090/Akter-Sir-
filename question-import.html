<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>

        Admin Question Import

    </title>

    <link
        rel="stylesheet"
        href="style.css">

    <!-- Firebase -->

    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>

<script src="question-import.js"></script>

</head>

<body>

    <div class="import-wrapper">

        <div class="import-card">

            <h1>

                📥 Question Import Panel

            </h1>

            <p>

                Admin Only

            </p>

            <!-- Category -->

            <label for="category">

                Select Category

            </label>

            <select id="category">

                <option value="সাধারণ জ্ঞান">সাধারণ জ্ঞান</option>

                <option value="বাংলাদেশ">বাংলাদেশ</option>

                <option value="আন্তর্জাতিক">আন্তর্জাতিক</option>

                <option value="ইসলাম">ইসলাম</option>

                <option value="বাংলা">বাংলা</option>

                <option value="ইংরেজি">ইংরেজি</option>

                <option value="গণিত">গণিত</option>

                <option value="বিজ্ঞান">বিজ্ঞান</option>

                <option value="আইসিটি">আইসিটি</option>

                <option value="ধাঁধা">ধাঁধা</option>

                <option value="ইতিহাস">ইতিহাস</option>

                <option value="ভূগোল">ভূগোল</option>

                <option value="খেলাধুলা">খেলাধুলা</option>

                <option value="বিনোদন">বিনোদন</option>

            </select>

            <br><br>

            <!-- Question Input -->

            <label for="questions">

                Paste Questions

            </label>

            <textarea
                id="questions"
                rows="22"
                spellcheck="false"
                placeholder="Paste your questions here..."></textarea>
                            <br>

            <!-- Action Buttons -->

            <div class="import-actions">

                <button
                    id="importBtn"
                    type="button">

                    📥 Import Questions

                </button>

                <button
                    id="clearBtn"
                    type="button">

                    🗑 Clear

                </button>

            </div>

            <br>

            <!-- Import Status -->

            <div
                id="statusBox"
                class="status-box">

                Ready to Import...

            </div>

            <br>

            <!-- Import Result -->

            <div
                id="resultBox"
                class="result-box">

                <h3>

                    Import Report

                </h3>

                <p>

                    Total :
                    <span id="totalCount">

                        0

                    </span>

                </p>

                <p>

                    Imported :
                    <span id="successCount">

                        0

                    </span>

                </p>

                <p>

                    Duplicate :
                    <span id="duplicateCount">

                        0

                    </span>

                </p>

                <p>

                    Failed :
                    <span id="failedCount">

                        0

                    </span>

                </p>

            </div>

        </div>

    </div>

    <!-- JavaScript -->

    <script src="question-import.js"></script>

</body>

</html>
