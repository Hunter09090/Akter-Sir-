<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Question Import</title>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>

<style>

body{

font-family:Arial,sans-serif;
background:#f5f5f5;
padding:30px;

}

.container{

max-width:900px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);

}

h2{

margin-top:0;

}

select,
textarea,
button{

width:100%;
padding:12px;
margin-top:10px;
font-size:16px;

}

textarea{

height:400px;
resize:vertical;

}

button{

cursor:pointer;

}

#status{

margin-top:20px;
font-weight:bold;

}

</style>

</head>

<body>

<div class="container">

<h2>Admin Question Import</h2>

<select id="category">

<option value="সাধারণ জ্ঞান">সাধারণ জ্ঞান</option>
<option value="বাংলাদেশ">বাংলাদেশ</option>
<option value="আন্তর্জাতিক">আন্তর্জাতিক</option>
<option value="ইসলাম">ইসলাম</option>
<option value="বাংলা">বাংলা</option>
<option value="ইংরেজি">ইংরেজি</option>
<option value="গণিত">গণিত</option>
<option value="বিজ্ঞান">বিজ্ঞান</option>
<option value="আইসিটি">আইসিটি</option>
<option value="ধাঁধা">ধাঁধা</option>
<option value="ইতিহাস">ইতিহাস</option>
<option value="ভূগোল">ভূগোল</option>
<option value="খেলাধুলা">খেলাধুলা</option>
<option value="বিনোদন">বিনোদন</option>
<option value="সাম্প্রতিক">সাম্প্রতিক</option>
    
</select>

<textarea id="questions" placeholder="Paste Questions Here"></textarea>

<button id="importBtn">

Import Questions

</button>

<div id="status">

Ready...

</div>

<script>
    const category =
document.getElementById("category");

const questions =
document.getElementById("questions");

const status =
document.getElementById("status");

document
.getElementById("importBtn")
.onclick = async function () {

status.innerHTML = "Import Started...";

const text =
questions.value.trim();

if (!text) {

alert("প্রশ্ন Paste করুন");

return;

}

const blocks =
text.split("===");

let success = 0;

let duplicate = 0;

let failed = 0;

for (const block of blocks) {

try{

const lines =
block
.split("\n")
.map(x=>x.trim())
.filter(x=>x);

if(lines.length<6){

failed++;

continue;

}

const question =
lines[0].replace("Q:","").trim();

const options=[

lines[1].replace("A:","").trim(),

lines[2].replace("B:","").trim(),

lines[3].replace("C:","").trim(),

lines[4].replace("D:","").trim()

];

const answerLetter =
lines[5]
.replace("Answer:","")
.trim()
.toUpperCase();

const answerMap={

A:options[0],

B:options[1],

C:options[2],

D:options[3]

};

const answer =
answerMap[answerLetter];

const exists =
await db
.collection("questions")
.where("category","==",category.value)
.where("question","==",question)
.limit(1)
.get();

if(!exists.empty){

duplicate++;

continue;

}

await db
.collection("questions")
.add({

category:category.value,

question,

options,

answer,

difficulty:"Easy",

createdAt:
firebase.firestore.FieldValue.serverTimestamp()

});

success++;

status.innerHTML=
`Imported ${success}`;

}catch(e){

console.error(e);

failed++;

}

}

status.innerHTML=`

✅ Done

<br><br>

Imported : ${success}

<br>

Duplicate : ${duplicate}

<br>

Failed : ${failed}

`;

questions.value="";

};

</script>

</body>

</html>
